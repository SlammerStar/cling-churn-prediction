version: '3.8'

services:
  cling-api:
    build: .
    ports:
      - "5002:5002"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - ALERT_EMAIL=${ALERT_EMAIL}
    volumes:
      - ./ml/artifacts:/app/ml/artifacts
